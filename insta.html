<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela instagram</title>

    <link rel="stylesheet" href="estilos/paginas.css">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

        ::-webkit-scrollbar {
            display: none;
        }

        img {
            
            width: 100%;
            height: 100%;
            object-position: center;
            
        }

        a {
            background-color: rgb(10, 10, 10);
            color: rgb(252, 249, 249);
            width: 100vw;
            padding: 12px;
            display: inline-block;
            text-align: center;
            text-decoration: none;
            font-family: medievalsharp, cursive;
            font-size: 2em;
            font-weight: bolder;
        }

        a:hover {
            background-color: rgb(252, 249, 249);
            color: rgb(10, 10, 10);
            transition: 0.3s;
        }
    </style>
</head>



<body>
    <img src="imagens/img-insta.jpg" alt="insta caos onipresente">
    <a href="https://www.instagram.com/caosonipresente/" target="_blank">Acesse</a>
</body>

</html>
